<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezerwacja wizyt</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <h1>System rezerwacji</h1>
        <img src="calendar-svgrepo-com.png" alt="calendar">
    </header>
    <main>
        <article>
            <h2>Lista wizyt</h2>
            <hr>
            <ul>
                <li></li>
            </ul>
        </article>
        <aside>
            <h2>Dodaj wizyte</h2>
            <form>
                <label for="imie">Imie klienta:</label>
                <input type="text" name="imie">
                <span></span>
                <label for="nazwisko">Nazwisko klienta:</label>
                <input type="text" name="nazwisko">
                <span></span>
                <label for="usluga">Usługi:</label>
                <select name="usluga" id="usluga">
                    <option value="strzyzenie">strzyżenie</option>
                    <option value="masaz">masaż</option>
                    <option value="farbowanie">farbowanie włosów</option>
                    <option value="kastracja">kastracja</option>
                </select>
                <span></span>
                <label for="data">Data wizyty:</label>
                <input type="date" name="data">
                <span></span>
                <label for="godzina">Godzina wizyty</label>
                <input type="time" name="godzina">
                <span></span>
                <button type="submit">Zarezerwuj wizyte</button>
                <span></span>
            </form>
        </aside>
    </main>
    <footer>
        <p>Dane autora:</p>
        <ol>
            <li>mariusz</li>
            <li>bober</li>
            <li>4Tie</li>
            <li>xxxxxxxxxxxx</li>
        </ol>
    </footer>
</body>
</html>
